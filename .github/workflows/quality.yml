name: Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Swift Project
        run: |
          cd OpenType
          swift build

      - name: Run Swift Tests
        run: |
          cd OpenType
          swift test 2>/dev/null || echo "No tests configured yet"

      - name: Check Swift Format
        run: |
          # Install swift-format if available
          if command -v swift-format &> /dev/null; then
            swift-format lint --recursive OpenType/Sources 2>/dev/null || true
          else
            echo "swift-format not installed, skipping format check"
          fi
